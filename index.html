<style>
/* ========================================
   RESET & BASE
   ======================================== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; overflow-x: hidden; }
body { font-family: var(--hs-font-body); font-size: var(--hs-text-base); line-height: 1.6; color: var(--hs-text-primary); background: var(--hs-bg-primary); min-height: 100vh; display: flex; flex-direction: column; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; transition: background var(--hs-duration-normal) ease, color var(--hs-duration-normal) ease; }
a { color: inherit; text-decoration: none; }
button { border: none; background: none; cursor: pointer; font: inherit; color: inherit; }
input { font: inherit; color: inherit; }
ul, ol { list-style: none; }
img { max-width: 100%; height: auto; display: block; }

/* ========================================
   DESIGN TOKENS
   ======================================== */
:root {
  /* Spacing */
  --hs-space-1: 0.25rem;
  --hs-space-2: 0.5rem;
  --hs-space-3: 0.75rem;
  --hs-space-4: 1rem;
  --hs-space-5: 1.5rem;
  --hs-space-6: 2rem;
  --hs-space-8: 3rem;
  --hs-space-10: 4rem;
  --hs-space-12: 5rem;

  /* Typography */
  --hs-font-brand: 'Bebas Neue', 'Arial Narrow', sans-serif;
  --hs-font-body: 'DM Sans', 'Helvetica Neue', sans-serif;
  --hs-text-xs: 0.75rem;
  --hs-text-sm: 0.875rem;
  --hs-text-base: 1rem;
  --hs-text-lg: 1.125rem;
  --hs-text-xl: 1.25rem;
  --hs-text-2xl: 1.5rem;
  --hs-text-3xl: 2rem;
  --hs-text-4xl: clamp(2rem, 5vw, 2.5rem);
  --hs-text-5xl: clamp(2.5rem, 7vw, 3.5rem);

  /* Radius */
  --hs-radius-sm: 6px;
  --hs-radius-md: 10px;
  --hs-radius-lg: 16px;
  --hs-radius-xl: 24px;
  --hs-radius-full: 9999px;

  /* Transitions */
  --hs-ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --hs-ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --hs-duration-fast: 150ms;
  --hs-duration-normal: 250ms;
  --hs-duration-slow: 400ms;

  /* Brand (constant) */
  --hs-purple: #a900ff;
  --hs-purple-dim: rgba(169, 0, 255, 0.15);
  --hs-purple-glow: rgba(169, 0, 255, 0.35);
  --hs-cyan: #00e5ff;
  --hs-cyan-dim: rgba(0, 229, 255, 0.15);
  --hs-cyan-glow: rgba(0, 229, 255, 0.35);
  --hs-spotify-green: #1DB954;
  --hs-spotify-green-hover: #1ed760;
  --hs-spotify-green-dim: rgba(29, 185, 84, 0.12);

  /* Z-index */
  --hs-z-dropdown: 100;
  --hs-z-header: 200;
  --hs-z-mobile-menu: 300;
  --hs-z-loading: 400;
  --hs-z-toast: 500;
}

/* ========================================
   DARK THEME
   ======================================== */
[data-theme="dark"] {
  --hs-bg-primary: #0d0b0e;
  --hs-bg-secondary: #16131a;
  --hs-bg-tertiary: #1f1b24;
  --hs-bg-card: rgba(255, 255, 255, 0.035);
  --hs-bg-card-hover: rgba(255, 255, 255, 0.07);
  --hs-bg-glass: rgba(13, 11, 14, 0.88);
  --hs-text-primary: #f0eaf5;
  --hs-text-secondary: #a299ad;
  --hs-text-tertiary: #6b6474;
  --hs-text-accent: var(--hs-purple);
  --hs-border: rgba(255, 255, 255, 0.07);
  --hs-border-strong: rgba(255, 255, 255, 0.14);
  --hs-input-bg: rgba(255, 255, 255, 0.055);
  --hs-input-border: rgba(255, 255, 255, 0.1);
  --hs-shadow-sm: 0 1px 3px rgba(0,0,0,0.4);
  --hs-shadow-md: 0 4px 16px rgba(0,0,0,0.45);
  --hs-shadow-lg: 0 8px 32px rgba(0,0,0,0.55);
  --hs-shadow-glow: 0 0 30px var(--hs-purple-dim), 0 0 60px var(--hs-cyan-dim);
  --hs-highlight-bg: rgba(169, 0, 255, 0.25);
  --hs-highlight-bg-cyan: rgba(0, 229, 255, 0.2);
  --hs-hero-overlay: rgba(13, 11, 14, 0.75);
}

/* ========================================
   LIGHT THEME
   ======================================== */
[data-theme="light"] {
  --hs-bg-primary: #faf8fc;
  --hs-bg-secondary: #f0ecf4;
  --hs-bg-tertiary: #e6e0ec;
  --hs-bg-card: rgba(0, 0, 0, 0.025);
  --hs-bg-card-hover: rgba(0, 0, 0, 0.055);
  --hs-bg-glass: rgba(250, 248, 252, 0.92);
  --hs-text-primary: #1a0e24;
  --hs-text-secondary: #5c4d6b;
  --hs-text-tertiary: #8a7d96;
  --hs-text-accent: #8a00cc;
  --hs-border: rgba(0, 0, 0, 0.07);
  --hs-border-strong: rgba(0, 0, 0, 0.13);
  --hs-input-bg: rgba(0, 0, 0, 0.04);
  --hs-input-border: rgba(0, 0, 0, 0.1);
  --hs-shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
  --hs-shadow-md: 0 4px 16px rgba(0,0,0,0.08);
  --hs-shadow-lg: 0 8px 32px rgba(0,0,0,0.1);
  --hs-shadow-glow: 0 0 30px rgba(169, 0, 255, 0.07), 0 0 60px rgba(0, 229, 255, 0.05);
  --hs-highlight-bg: rgba(169, 0, 255, 0.12);
  --hs-highlight-bg-cyan: rgba(0, 229, 255, 0.1);
  --hs-hero-overlay: rgba(250, 248, 252, 0.82);
}

/* ========================================
   SKIP LINK
   ======================================== */
.hs-skip {
  position: absolute; left: -9999px; top: 0;
  padding: var(--hs-space-3) var(--hs-space-5);
  background: var(--hs-purple); color: #fff;
  z-index: 9999; border-radius: 0 0 var(--hs-radius-md) 0;
  font-weight: 600;
}
.hs-skip:focus { left: 0; }

/* ========================================
   HEADER / NAV
   ======================================== */
.hs-header {
  position: fixed; top: 0; left: 0; right: 0;
  z-index: var(--hs-z-header);
  background: var(--hs-bg-glass);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--hs-border);
  transition: background var(--hs-duration-normal) ease;
}
.hs-nav {
  max-width: 1200px; margin: 0 auto;
  display: flex; align-items: center; justify-content: space-between;
  padding: var(--hs-space-3) var(--hs-space-5);
  height: 56px;
}
.hs-nav__logo { display: flex; align-items: center; flex-shrink: 0; }
.hs-nav__logo-text {
  font-family: var(--hs-font-brand); font-size: var(--hs-text-xl);
  letter-spacing: 0.04em; line-height: 1;
  background: linear-gradient(135deg, var(--hs-purple), var(--hs-cyan));
  -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
}
.hs-nav__links { display: flex; gap: var(--hs-space-5); align-items: center; }
.hs-nav__link {
  font-size: var(--hs-text-sm); color: var(--hs-text-secondary);
  transition: color var(--hs-duration-fast); font-weight: 500;
  padding: var(--hs-space-1) 0;
}
.hs-nav__link:hover, .hs-nav__link--active { color: var(--hs-text-primary); }
.hs-nav__actions { display: flex; align-items: center; gap: var(--hs-space-3); }

/* Theme toggle */
.hs-theme-toggle {
  width: 40px; height: 40px; border-radius: var(--hs-radius-full);
  display: flex; align-items: center; justify-content: center;
  color: var(--hs-text-secondary);
  transition: color var(--hs-duration-fast), background var(--hs-duration-fast);
}
.hs-theme-toggle:hover { color: var(--hs-text-primary); background: var(--hs-bg-card-hover); }
.hs-theme-toggle svg { width: 20px; height: 20px; transition: transform var(--hs-duration-normal) var(--hs-ease-spring); }
.hs-theme-toggle:hover svg { transform: rotate(15deg); }

/* Mobile burger */
.hs-nav__burger {
  display: none; width: 40px; height: 40px;
  flex-direction: column; align-items: center; justify-content: center; gap: 5px;
  border-radius: var(--hs-radius-full);
  transition: background var(--hs-duration-fast);
}
.hs-nav__burger:hover { background: var(--hs-bg-card-hover); }
.hs-nav__burger span {
  display: block; width: 18px; height: 2px;
  background: var(--hs-text-secondary); border-radius: 2px;
  transition: transform var(--hs-duration-normal) var(--hs-ease-out), opacity var(--hs-duration-fast);
}
.hs-nav__burger--open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
.hs-nav__burger--open span:nth-child(2) { opacity: 0; }
.hs-nav__burger--open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

/* Mobile menu */
.hs-mobile-menu {
  position: fixed; top: 56px; right: 0; bottom: 0; width: 280px;
  background: var(--hs-bg-secondary); z-index: var(--hs-z-mobile-menu);
  transform: translateX(100%); transition: transform var(--hs-duration-slow) var(--hs-ease-out);
  padding: var(--hs-space-6) var(--hs-space-5);
  display: flex; flex-direction: column; gap: var(--hs-space-2);
  border-left: 1px solid var(--hs-border);
}
.hs-mobile-menu--open { transform: translateX(0); }
.hs-mobile-backdrop {
  position: fixed; inset: 0; top: 56px;
  background: rgba(0,0,0,0.5); z-index: calc(var(--hs-z-mobile-menu) - 1);
  opacity: 0; pointer-events: none; transition: opacity var(--hs-duration-normal);
}
.hs-mobile-backdrop--visible { opacity: 1; pointer-events: auto; }
.hs-mobile-menu__link {
  display: block; padding: var(--hs-space-3) var(--hs-space-4);
  border-radius: var(--hs-radius-md); font-size: var(--hs-text-lg);
  color: var(--hs-text-secondary); font-weight: 500;
  transition: background var(--hs-duration-fast), color var(--hs-duration-fast);
}
.hs-mobile-menu__link:hover { background: var(--hs-bg-card-hover); color: var(--hs-text-primary); }

@media (max-width: 768px) {
  .hs-nav__links { display: none; }
  .hs-nav__burger { display: flex; }
}

/* ========================================
   HERO SECTION
   ======================================== */
.hs-hero {
  min-height: calc(100vh - 56px); padding-top: calc(56px + var(--hs-space-8));
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding-left: var(--hs-space-5); padding-right: var(--hs-space-5);
  padding-bottom: var(--hs-space-10);
  position: relative;
  transition: min-height var(--hs-duration-slow) var(--hs-ease-out),
              padding var(--hs-duration-slow) var(--hs-ease-out);
}
.hs-hero__bg {
  position: absolute; inset: 0; z-index: -1; overflow: hidden;
  background-image: url('images/Screenshot_20230626-052055_2-01.webp');
  background-size: cover; background-position: center top;
  filter: blur(60px) saturate(0.7); opacity: 0.25;
  transform: scale(1.15);
  transition: opacity var(--hs-duration-slow);
}
[data-theme="light"] .hs-hero__bg { opacity: 0.12; filter: blur(60px) saturate(0.5); }

.hs-hero__brand {
  text-align: center; margin-bottom: var(--hs-space-8);
  max-height: 300px; overflow: hidden; opacity: 1;
  transition: max-height var(--hs-duration-slow) var(--hs-ease-out),
              opacity var(--hs-duration-normal) var(--hs-ease-out),
              margin var(--hs-duration-slow) var(--hs-ease-out);
}
.hs-hero__title {
  font-family: var(--hs-font-brand); font-size: var(--hs-text-5xl);
  letter-spacing: 0.06em; line-height: 1; margin-bottom: var(--hs-space-3);
  background: linear-gradient(135deg, var(--hs-purple) 0%, var(--hs-cyan) 100%);
  -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
}
.hs-hero__subtitle {
  color: var(--hs-text-secondary); font-size: var(--hs-text-lg);
}
.hs-hero__episode-count {
  color: var(--hs-cyan); font-weight: 600;
}

/* Hero collapsed state */
.hs--has-results .hs-hero {
  min-height: auto;
  padding-top: calc(56px + var(--hs-space-6));
  padding-bottom: var(--hs-space-5);
  justify-content: flex-start;
}
.hs--has-results .hs-hero__bg { opacity: 0.1; }
.hs--has-results .hs-hero__brand {
  max-height: 0; opacity: 0; margin: 0; pointer-events: none; overflow: hidden;
}

/* ========================================
   SEARCH BAR
   ======================================== */
.hs-search { width: 100%; max-width: 640px; }
.hs-search__bar {
  display: flex; align-items: center; gap: var(--hs-space-3);
  width: 100%; padding: var(--hs-space-3) var(--hs-space-5);
  background: var(--hs-input-bg); border: 1.5px solid var(--hs-input-border);
  border-radius: var(--hs-radius-full);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  transition: border-color var(--hs-duration-fast), box-shadow var(--hs-duration-fast);
}
.hs-search__bar:focus-within {
  border-color: var(--hs-purple);
  box-shadow: 0 0 0 3px var(--hs-purple-dim), 0 0 30px var(--hs-purple-dim), 0 0 60px var(--hs-cyan-dim);
}
.hs-search__icon { width: 20px; height: 20px; flex-shrink: 0; color: var(--hs-text-tertiary); }
.hs-search__input {
  flex: 1; border: none; background: transparent; outline: none;
  font-size: var(--hs-text-base); color: var(--hs-text-primary);
  min-width: 0;
}
.hs-search__input::placeholder { color: var(--hs-text-tertiary); }
.hs-search__submit {
  width: 36px; height: 36px; border-radius: var(--hs-radius-full);
  background: linear-gradient(135deg, var(--hs-purple), var(--hs-cyan)); color: #fff;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  transition: opacity var(--hs-duration-fast), transform var(--hs-duration-fast) var(--hs-ease-spring);
}
.hs-search__submit:hover { opacity: 0.85; transform: scale(1.06); }
.hs-search__submit svg { width: 18px; height: 18px; }

/* ========================================
   FILTERS
   ======================================== */
.hs-filters {
  display: flex; gap: var(--hs-space-3); margin-top: var(--hs-space-4);
  justify-content: center; flex-wrap: wrap;
}
.hs-select { position: relative; }
.hs-select__trigger {
  display: flex; align-items: center; gap: var(--hs-space-2);
  padding: var(--hs-space-2) var(--hs-space-4);
  background: var(--hs-bg-card); border: 1px solid var(--hs-border);
  border-radius: var(--hs-radius-full); font-size: var(--hs-text-sm);
  color: var(--hs-text-secondary); white-space: nowrap;
  transition: border-color var(--hs-duration-fast), background var(--hs-duration-fast);
}
.hs-select__trigger:hover { border-color: var(--hs-border-strong); background: var(--hs-bg-card-hover); }
.hs-select--open .hs-select__trigger { border-color: var(--hs-cyan); }
.hs-select__label { color: var(--hs-text-tertiary); margin-right: var(--hs-space-1); }
.hs-select__value { color: var(--hs-text-primary); font-weight: 500; }
.hs-select__chevron {
  width: 14px; height: 14px; color: var(--hs-text-tertiary);
  transition: transform var(--hs-duration-fast);
}
.hs-select--open .hs-select__chevron { transform: rotate(180deg); }

/* Dropdown panel */
.hs-select__dropdown {
  position: absolute; top: calc(100% + var(--hs-space-2)); left: 0;
  min-width: 220px; max-height: 340px; overflow-y: auto;
  background: var(--hs-bg-secondary); border: 1px solid var(--hs-border-strong);
  border-radius: var(--hs-radius-md); box-shadow: var(--hs-shadow-lg);
  z-index: var(--hs-z-dropdown);
  opacity: 0; transform: translateY(-6px); pointer-events: none;
  transition: opacity var(--hs-duration-fast), transform var(--hs-duration-fast) var(--hs-ease-out);
  scrollbar-width: thin; scrollbar-color: var(--hs-border-strong) transparent;
}
.hs-select--open .hs-select__dropdown { opacity: 1; transform: translateY(0); pointer-events: auto; }

.hs-select__dropdown::-webkit-scrollbar { width: 6px; }
.hs-select__dropdown::-webkit-scrollbar-track { background: transparent; }
.hs-select__dropdown::-webkit-scrollbar-thumb { background: var(--hs-border-strong); border-radius: 3px; }

.hs-select__option {
  padding: var(--hs-space-3) var(--hs-space-4); font-size: var(--hs-text-sm);
  color: var(--hs-text-secondary); cursor: pointer;
  transition: background var(--hs-duration-fast), color var(--hs-duration-fast);
}
.hs-select__option:hover { background: var(--hs-bg-card-hover); color: var(--hs-text-primary); }
.hs-select__option--selected { color: var(--hs-text-accent); font-weight: 600; }
.hs-select__option-date { font-size: var(--hs-text-xs); color: var(--hs-text-tertiary); margin-left: var(--hs-space-2); }

/* Episode dropdown search */
.hs-select__search-wrap { padding: var(--hs-space-2) var(--hs-space-3); border-bottom: 1px solid var(--hs-border); position: sticky; top: 0; background: var(--hs-bg-secondary); z-index: 1; }
.hs-select__search {
  width: 100%; border: 1px solid var(--hs-border); background: var(--hs-input-bg);
  border-radius: var(--hs-radius-sm); padding: var(--hs-space-2) var(--hs-space-3);
  font-size: var(--hs-text-sm); outline: none; color: var(--hs-text-primary);
}
.hs-select__search:focus { border-color: var(--hs-purple); }
.hs-select__search::placeholder { color: var(--hs-text-tertiary); }

/* Episode dropdown wider */
.hs-select--episode .hs-select__dropdown { min-width: 320px; right: 0; left: auto; }
@media (max-width: 480px) {
  .hs-select--episode .hs-select__dropdown { min-width: calc(100vw - 2 * var(--hs-space-5)); left: 50%; transform: translateX(-50%) translateY(-6px); }
  .hs-select--episode.hs-select--open .hs-select__dropdown { transform: translateX(-50%) translateY(0); }
}

/* ========================================
   RESULTS
   ======================================== */
.hs-results {
  width: 100%; max-width: 760px; margin: 0 auto;
  padding: 0 var(--hs-space-5) var(--hs-space-10);
  display: none;
}
.hs--has-results .hs-results { display: block; }

.hs-results__header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: var(--hs-space-5); flex-wrap: wrap; gap: var(--hs-space-3);
}
.hs-results__count {
  font-size: var(--hs-text-sm); color: var(--hs-text-secondary); font-weight: 500;
}
.hs-results__share {
  display: flex; align-items: center; gap: var(--hs-space-2);
  font-size: var(--hs-text-sm); color: var(--hs-text-tertiary);
  padding: var(--hs-space-2) var(--hs-space-3);
  border-radius: var(--hs-radius-full); border: 1px solid var(--hs-border);
  transition: color var(--hs-duration-fast), border-color var(--hs-duration-fast);
}
.hs-results__share:hover { color: var(--hs-text-primary); border-color: var(--hs-border-strong); }
.hs-results__share svg { width: 14px; height: 14px; }

/* Result cards */
.hs-results__list { display: flex; flex-direction: column; gap: var(--hs-space-3); }

.hs-card {
  display: grid; grid-template-columns: 1fr auto; grid-template-rows: auto auto;
  gap: var(--hs-space-1) var(--hs-space-4);
  padding: var(--hs-space-4) var(--hs-space-5);
  background: var(--hs-bg-card); border: 1px solid var(--hs-border);
  border-radius: var(--hs-radius-lg);
  transition: background var(--hs-duration-fast), border-color var(--hs-duration-fast),
              transform var(--hs-duration-fast) var(--hs-ease-spring), box-shadow var(--hs-duration-fast);
  animation: hs-card-in var(--hs-duration-slow) var(--hs-ease-out) both;
  animation-delay: calc(var(--hs-i, 0) * 40ms);
  text-decoration: none;
}
.hs-card:hover {
  background: var(--hs-bg-card-hover); border-color: var(--hs-border-strong);
  transform: translateY(-2px); box-shadow: var(--hs-shadow-md);
}

.hs-card__meta { grid-column: 1; grid-row: 1; display: flex; align-items: center; gap: var(--hs-space-3); flex-wrap: wrap; min-width: 0; }
.hs-card__episode {
  font-size: var(--hs-text-sm); font-weight: 600; color: var(--hs-text-primary);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%;
}
.hs-card__time {
  font-size: var(--hs-text-xs); font-weight: 600; color: var(--hs-cyan);
  background: var(--hs-highlight-bg-cyan); padding: 2px 8px;
  border-radius: var(--hs-radius-full); white-space: nowrap; flex-shrink: 0;
}

.hs-card__text {
  grid-column: 1; grid-row: 2; font-size: var(--hs-text-sm);
  color: var(--hs-text-secondary); line-height: 1.65;
  overflow: hidden; text-overflow: ellipsis;
  display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
}
.hs-card__text mark {

<script>
/* ========================================
   STATE
   ======================================== */
const S = {
  query: '',
  sortBy: '',
  folgeId: '',
  offset: 0,
  limit: 25,
  results: null,
  episodes: null,
  theme: 'dark',
  isLoading: false,
  hasSearched: false,
};

const API = 'https://api.hobbylos.online/';

/* ========================================
   DOM CACHE
   ======================================== */
const $ = id => document.getElementById(id);
const DOM = {
  app: $('app'),
  form: $('hs-search-form'),
  input: $('hs-search-input'),
  hero: $('hs-hero'),
  results: $('hs-results'),
  resultsList: $('hs-results-list'),
  resultsHeader: $('hs-results-header'),
  pagination: $('hs-pagination'),
  loading: $('hs-loading'),
  error: $('hs-error'),
  errorTitle: $('hs-error-title'),
  errorMsg: $('hs-error-message'),
  errorHint: $('hs-error-hint'),
  errorContact: $('hs-error-contact'),
  sortValue: $('hs-sort-value'),
  episodeValue: $('hs-episode-value'),
  episodeOptions: $('hs-episode-options'),
  episodeCount: $('hs-episode-count'),
  themeToggle: $('hs-theme-toggle'),
  iconSun: $('hs-icon-sun'),
  iconMoon: $('hs-icon-moon'),
  burger: $('hs-burger'),
  mobileMenu: $('hs-mobile-menu'),
  mobileBackdrop: $('hs-mobile-backdrop'),
  toast: $('hs-toast'),
};

/* ========================================
   THEME
   ======================================== */
function initTheme() {
  const saved = localStorage.getItem('hs-theme');
  if (saved) {
    S.theme = saved;
  } else if (window.matchMedia('(prefers-color-scheme: light)').matches) {
    S.theme = 'light';
  }
  applyTheme();
}

function applyTheme() {
  document.documentElement.dataset.theme = S.theme;
  DOM.iconSun.style.display = S.theme === 'dark' ? 'block' : 'none';
  DOM.iconMoon.style.display = S.theme === 'light' ? 'block' : 'none';
}

function toggleTheme() {
  S.theme = S.theme === 'dark' ? 'light' : 'dark';
  localStorage.setItem('hs-theme', S.theme);
  applyTheme();
}

/* ========================================
   URL STATE
   ======================================== */
function readStateFromUrl() {
  const p = new URLSearchParams(window.location.search);
  S.query = p.get('q') || '';
  S.sortBy = p.get('sort_by_time') || '';
  S.folgeId = p.get('folge_id') || '';
  S.offset = parseInt(p.get('offset') || '0', 10);
  S.limit = parseInt(p.get('limit') || '25', 10);
  DOM.input.value = S.query;
  updateSortDisplay();
}

function syncUrlFromState() {
  const p = new URLSearchParams();
  if (S.query) p.set('q', S.query);
  if (S.sortBy) p.set('sort_by_time', S.sortBy);
  if (S.folgeId) p.set('folge_id', S.folgeId);
  if (S.offset > 0) p.set('offset', S.offset);
  if (S.limit !== 25) p.set('limit', S.limit);
  const qs = p.toString();
  const url = window.location.pathname + (qs ? '?' + qs : '');
  history.pushState({ hs: true }, '', url);
}

function updateTitle() {
  document.title = S.query
    ? S.query + ' - Hobbylos Suche'
    : 'Hobbylos Suche - Podcast Suchmaschine';
}

/* ========================================
   EPISODES
   ======================================== */
async function loadEpisodes() {
  try {
    const res = await fetch(API + 'folgen');
    if (!res.ok) return;
    S.episodes = await res.json();
    renderEpisodeDropdown(S.episodes.folgen || []);
    if (S.episodes.total_indexed) {
      DOM.episodeCount.textContent = S.episodes.total_indexed + ' von ' + S.episodes.total_on_spotify + ' Folgen durchsuchbar';
    }
  } catch (e) {
    /* silent — episode filter just won't be populated */
  }
}

function renderEpisodeDropdown(folgen) {
  /* Keep first "Alle Folgen" option */
  while (DOM.episodeOptions.children.length > 1) {
    DOM.episodeOptions.removeChild(DOM.episodeOptions.lastChild);
  }
  folgen.forEach(f => {
    const li = document.createElement('li');
    li.className = 'hs-select__option';
    li.setAttribute('role', 'option');
    li.dataset.value = f.id;
    li.setAttribute('aria-selected', S.folgeId === f.id ? 'true' : 'false');
    if (S.folgeId === f.id) li.classList.add('hs-select__option--selected');

    li.textContent = f.name;
    if (f.release_date) {
      const dateSpan = document.createElement('span');
      dateSpan.className = 'hs-select__option-date';
      dateSpan.textContent = f.release_date;
      li.appendChild(dateSpan);
    }
    DOM.episodeOptions.appendChild(li);
  });
  /* Update display if folgeId was set from URL */
  if (S.folgeId) {
    const match = folgen.find(f => f.id === S.folgeId);
    if (match) DOM.episodeValue.textContent = match.name;
  }
}

/* ========================================
   CUSTOM DROPDOWNS
   ======================================== */
function initSelects() {
  document.querySelectorAll('.hs-select').forEach(sel => {
    const trigger = sel.querySelector('.hs-select__trigger');
    const type = sel.dataset.type;

    trigger.addEventListener('click', e => {
      e.stopPropagation();
      /* Close other selects */
      document.querySelectorAll('.hs-select--open').forEach(s => {
        if (s !== sel) closeSelect(s);
      });
      sel.classList.toggle('hs-select--open');
      trigger.setAttribute('aria-expanded', sel.classList.contains('hs-select--open'));
      /* Focus search input in episode dropdown */
      if (sel.classList.contains('hs-select--open')) {
        const searchInput = sel.querySelector('.hs-select__search');
        if (searchInput) setTimeout(() => searchInput.focus(), 50);
      }
    });

    /* Option clicks */
    sel.addEventListener('click', e => {
      const opt = e.target.closest('.hs-select__option');
      if (!opt) return;
      const value = opt.dataset.value;

      /* Update selection styling */
      sel.querySelectorAll('.hs-select__option').forEach(o => {
        o.classList.remove('hs-select__option--selected');
        o.setAttribute('aria-selected', 'false');
      });
      opt.classList.add('hs-select__option--selected');
      opt.setAttribute('aria-selected', 'true');

      if (type === 'sort') {
        S.sortBy = value;
        DOM.sortValue.textContent = opt.textContent;
      } else if (type === 'episode') {
        S.folgeId = value;
        DOM.episodeValue.textContent = value ? opt.childNodes[0].textContent : 'Alle Folgen';
      }
      closeSelect(sel);

      /* Re-trigger search if we have a query */
      if (S.query) {
        S.offset = 0;
        performSearch();
        syncUrlFromState();
      }
    });

    /* Episode search filter */
    const searchInput = sel.querySelector('.hs-select__search');
    if (searchInput) {
      searchInput.addEventListener('input', () => {
        const term = searchInput.value.toLowerCase();
        sel.querySelectorAll('.hs-select__option').forEach(opt => {
          if (opt.dataset.value === '') { opt.style.display = ''; return; }
          opt.style.display = opt.textContent.toLowerCase().includes(term) ? '' : 'none';
        });
      });
      searchInput.addEventListener('click', e => e.stopPropagation());
    }
  });

  /* Close on outside click */
  document.addEventListener('click', () => {
    document.querySelectorAll('.hs-select--open').forEach(closeSelect);
  });
  /* Close on Escape */
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      document.querySelectorAll('.hs-select--open').forEach(closeSelect);
      closeMobileMenu();
    }
  });
}

function closeSelect(sel) {
  sel.classList.remove('hs-select--open');
  sel.querySelector('.hs-select__trigger').setAttribute('aria-expanded', 'false');
  const searchInput = sel.querySelector('.hs-select__search');
  if (searchInput) {
    searchInput.value = '';
    sel.querySelectorAll('.hs-select__option').forEach(o => o.style.display = '');
  }
}

function updateSortDisplay() {
  const labels = { '': 'Relevanz', 'forward': 'Neueste zuerst', 'reverse': 'Älteste zuerst' };
  DOM.sortValue.textContent = labels[S.sortBy] || 'Relevanz';
  /* Update selected styling */
  const sortSel = $('hs-sort-select');
  sortSel.querySelectorAll('.hs-select__option').forEach(opt => {
    const selected = opt.dataset.value === S.sortBy;
    opt.classList.toggle('hs-select__option--selected', selected);
    opt.setAttribute('aria-selected', selected);
  });
}

/* ========================================
   SEARCH
   ======================================== */
async function performSearch(fullUrl) {
  if (!S.query && !fullUrl) return;
  S.isLoading = true;
  updateUI();

  let url;
  if (fullUrl) {
    url = fullUrl;
  } else {
    const p = new URLSearchParams();
    p.set('word', S.query);
    p.set('offset', S.offset);
    p.set('limit', S.offset + S.limit);
    if (S.sortBy) p.set('sort_by_time', S.sortBy);
    if (S.folgeId) p.set('folge_id', S.folgeId);
    url = API + '?' + p.toString();
  }

  try {
    const res = await fetch(url);
    const data = await res.json();
    if (data.Error) {
      showError('not-found', data.Error);
    } else {
      S.results = data;
      S.hasSearched = true;
      hideError();
      renderResults();
    }
  } catch (err) {
    showError('server');
  }
  S.isLoading = false;
  updateUI();
  updateTitle();
}

/* ========================================
   RENDER RESULTS
   ======================================== */
function renderResults() {
  const data = S.results;
  if (!data) return;

  /* Header */
  DOM.resultsHeader.innerHTML = '';
  const countEl = document.createElement('span');
  countEl.className = 'hs-results__count';
  countEl.textContent = data.count_all || '';
  DOM.resultsHeader.appendChild(countEl);

  const shareBtn = document.createElement('button');
  shareBtn.className = 'hs-results__share';
  shareBtn.type = 'button';
  shareBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>';
  const shareTxt = document.createElement('span');
  shareTxt.textContent = 'Teilen';
  shareBtn.appendChild(shareTxt);
  shareBtn.addEventListener('click', shareResults);
  DOM.resultsHeader.appendChild(shareBtn);

  /* Cards */
  DOM.resultsList.innerHTML = '';
  if (data.search && data.search.length > 0) {
    data.search.forEach((r, i) => {
      DOM.resultsList.appendChild(createCard(r, i));
    });
  }

  /* Pagination */
  DOM.pagination.innerHTML = '';
  const hasPrev = !!data.previous;
  const hasNext = !!data.next;
  if (hasPrev || hasNext) {
    if (hasPrev) {
      const btn = document.createElement('button');
      btn.className = 'hs-pagination__btn';
      btn.type = 'button';
      btn.textContent = 'Zurück';
      btn.addEventListener('click', () => goToPage(data.previous));
      DOM.pagination.appendChild(btn);
    }
    const info = document.createElement('span');
    info.className = 'hs-pagination__info';
    info.textContent = (data.v || 0) + ' – ' + (data.b || 0);
    DOM.pagination.appendChild(info);
    if (hasNext) {
      const btn = document.createElement('button');
      btn.className = 'hs-pagination__btn';
      btn.type = 'button';
      btn.textContent = 'Weiter';
      btn.addEventListener('click', () => goToPage(data.next));
      DOM.pagination.appendChild(btn);
    }
  }
}

function createCard(r, index) {
  const link = document.createElement('a');
  link.className = 'hs-card';
  link.href = 'https://open.spotify.com/episode/' + encodeURIComponent(r.f) + '?go=1&t=' + encodeURIComponent(r.s) + '&utm_source=search.hobbylos.online';
  link.target = '_blank';
  link.rel = 'noopener';
  link.style.setProperty('--hs-i', index);

  /* Meta row */
  const meta = document.createElement('div');
  meta.className = 'hs-card__meta';

  const episode = document.createElement('span');
  episode.className = 'hs-card__episode';
  episode.textContent = r.n || r.f;
  meta.appendChild(episode);

  const time = document.createElement('span');
  time.className = 'hs-card__time';
  time.textContent = formatTimestamp(r.s);
  meta.appendChild(time);

  link.appendChild(meta);

  /* Text row */
  const text = document.createElement('div');
  text.className = 'hs-card__text';
  highlightText(text, r.text || '', S.query);
  link.appendChild(text);

  /* Play button */
  const play = document.createElement('div');
  play.className = 'hs-card__play';
  play.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>';
  play.setAttribute('aria-hidden', 'true');
  link.appendChild(play);

  return link;
}

/* ========================================
   HIGHLIGHT (XSS-safe)
   ======================================== */
function highlightText(container, text, term) {
  if (!term || !text) {
    container.textContent = text;
    return;
  }
  const lower = text.toLowerCase();
  const termLower = term.toLowerCase();
  let lastIndex = 0;
  let pos = lower.indexOf(termLower);

  if (pos === -1) {
    container.textContent = text;
    return;
  }

  while (pos !== -1) {
    if (pos > lastIndex) {
      container.appendChild(document.createTextNode(text.slice(lastIndex, pos)));
    }
    const mark = document.createElement('mark');
    mark.textContent = text.slice(pos, pos + term.length);
    container.appendChild(mark);
    lastIndex = pos + term.length;
    pos = lower.indexOf(termLower, lastIndex);
  }
  if (lastIndex < text.length) {
    container.appendChild(document.createTextNode(text.slice(lastIndex)));
  }
}

/* ========================================
   HELPERS
   ======================================== */
function formatTimestamp(seconds) {
  const s = Math.floor(seconds);
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  const pad = n => String(n).padStart(2, '0');
  return h > 0 ? h + ':' + pad(m) + ':' + pad(sec) : m + ':' + pad(sec);
}

function goToPage(url) {
  if (!url) return;
  performSearch(url);
  /* Scroll to top of results */
  DOM.hero.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function shareResults() {
  const url = window.location.href;
  if (navigator.share) {
    navigator.share({
      title: 'Hobbylos Suche',
      text: 'Suchergebnisse zu "' + S.query + '" im Hobbylos Podcast',
      url: url,
    }).catch(() => {});
  } else if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => showToast('Link kopiert!')).catch(() => {});
  }
}

function showToast(msg) {
  DOM.toast.textContent = msg;
  DOM.toast.classList.add('hs-toast--visible');
  setTimeout(() => DOM.toast.classList.remove('hs-toast--visible'), 2500);
}

/* ========================================
   UI STATE
   ======================================== */
function updateUI() {
  DOM.app.classList.toggle('hs--has-results', S.hasSearched || S.isLoading);
  DOM.loading.classList.toggle('hs-loading--visible', S.isLoading);
  DOM.loading.setAttribute('aria-hidden', !S.isLoading);
  if (S.isLoading) {
    DOM.results.style.display = 'none';
  } else if (S.hasSearched) {
    DOM.results.style.display = '';
  }
}

function showError(type, apiMessage) {
  S.hasSearched = false;
  DOM.results.style.display = 'none';
  DOM.app.classList.remove('hs--has-results');

  if (type === 'server') {
    DOM.errorTitle.textContent = 'Kurze Pause';
    DOM.errorMsg.textContent = 'Die Suche ist gerade nicht erreichbar \u2014 wahrscheinlich wird kurz etwas verbessert. Normalerweise dauert das nur ein paar Minuten.';
    DOM.errorHint.textContent = 'Falls es länger so bleibt, sag gerne Bescheid:';
    DOM.errorContact.style.display = '';
  } else if (type === 'not-found') {
    DOM.errorTitle.textContent = 'Kein Treffer';
    DOM.errorMsg.textContent = apiMessage || 'Dazu wurde leider nichts gefunden. Versuch\u2019s mal mit einem anderen Begriff oder einer anderen Schreibweise.';
    DOM.errorHint.textContent = '';
    DOM.errorContact.style.display = 'none';
  } else {
    DOM.errorTitle.textContent = 'Ups';
    DOM.errorMsg.textContent = apiMessage || 'Da ist etwas schiefgelaufen.';
    DOM.errorHint.textContent = 'Falls das öfter passiert, meld dich gerne:';
    DOM.errorContact.style.display = '';
  }

  DOM.error.classList.add('hs-error--visible');
  DOM.error.setAttribute('aria-hidden', 'false');
}

function hideError() {
  DOM.error.classList.remove('hs-error--visible');
  DOM.error.setAttribute('aria-hidden', 'true');
}

/* ========================================
   MOBILE MENU
   ======================================== */
function toggleMobileMenu() {
  const isOpen = DOM.mobileMenu.classList.toggle('hs-mobile-menu--open');
  DOM.mobileBackdrop.classList.toggle('hs-mobile-backdrop--visible', isOpen);
  DOM.burger.classList.toggle('hs-nav__burger--open', isOpen);
  DOM.burger.setAttribute('aria-expanded', isOpen);
  DOM.mobileMenu.setAttribute('aria-hidden', !isOpen);
}

function closeMobileMenu() {
  DOM.mobileMenu.classList.remove('hs-mobile-menu--open');
  DOM.mobileBackdrop.classList.remove('hs-mobile-backdrop--visible');
  DOM.burger.classList.remove('hs-nav__burger--open');
  DOM.burger.setAttribute('aria-expanded', 'false');
  DOM.mobileMenu.setAttribute('aria-hidden', 'true');
}

/* ========================================
   INIT
   ======================================== */
function init() {
  initTheme();
  readStateFromUrl();
  initSelects();
  loadEpisodes();

  /* Search form submit */
  DOM.form.addEventListener('submit', e => {
    e.preventDefault();
    S.query = DOM.input.value.trim();
    if (!S.query) return;
    S.offset = 0;
    hideError();
    performSearch();
    syncUrlFromState();
  });

  /* Browser back/forward */
  window.addEventListener('popstate', () => {
    readStateFromUrl();
    if (S.query) {
      performSearch();
    } else {
      S.hasSearched = false;
      updateUI();
    }
  });

  /* Theme toggle */
  DOM.themeToggle.addEventListener('click', toggleTheme);

  /* Mobile menu */
  DOM.burger.addEventListener('click', toggleMobileMenu);
  DOM.mobileBackdrop.addEventListener('click', closeMobileMenu);

  /* Auto-search if query in URL */
  if (S.query) {
    performSearch();
  }

  updateTitle();
}

init();
</script>
