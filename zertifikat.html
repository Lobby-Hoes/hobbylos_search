    <script>
        const outputdiv = document.getElementById("outputdiv");
        let images = {};
        let podcastname;
        let current_podcast_id;
        let followed_since;
        let followed_since_days;
        outputdiv.innerHTML = '<div><h1>Hol dir dein Zertifikat</h1><button id="spotify_login" class="spotify-login-button"><img src="https://search.hobbylos.online/images/Spotify_Icon_RGB_White.png" height="25px" style="position: relative;left: -6px;"> <span style="position: relative;">Login</span></button><br><div id="output"></div></div><div class="podcast-preview footer-div"><a href="./faq" style="margin-right: 10px;margin-left: 10px;">FAQ</a><a href="./datenschutz-impressum" style="margin-right: 10px;margin-left: 10px;">Datenschutz</a><a href="https://api.whatsapp.com/send?phone=+4915678159173&text=Hey%20ich%20war%20auf%20https://search.hobbylos.online/%20und%20habe%20eine%20Frage/Feedback/einen%20Fehler%20gefunden:%0A" style="margin-right: 10px;margin-left: 10px;">Kontakt</a></div>';
        document.getElementById("spotify_login").addEventListener("click", spotify_login);
        function spotify_login() {
            document.getElementById("spotify_login").style.display = "none";
            fetch('https://api.hobbylos.online/login')
            .then(response => {
                if (response.ok) {return response.json();}
                throw new Error('Network response was not ok.');
            })
            .then(data => {
                if (data.link) {window.location.href = data.link;
                } else {console.log(data);}
            })
            .catch(error => {console.error('There was a problem with the fetch operation:', error);});
        }
        function spotify_logout() {
            const token = localStorage.getItem('bearer_token');
            localStorage.removeItem("bearer_token");
            fetch('https://api.hobbylos.online/logout', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({token: token})
            })
            .then(response => {if (!response.ok) {throw new Error('Network response was not ok');}})
            .catch(error => {console.error('There was a problem with the fetch operation:', error);});
            location.reload();
        }
        function getValueOfLargestKey(obj) {
            var keys = Object.keys(obj);
            var largestKey = Math.max(...keys);
            var valueOfLargestKey = obj[largestKey];
            return valueOfLargestKey;
        }
        function getUrlParameter(name, url=location.search) {
            name = name.replace(/[\[]/, '\\[').replace(/[\]]/, '\\]');
            var regex = new RegExp('[\\?&]' + name + '=([^&#]*)');
            var results = regex.exec(url);
            return results === null ? '' : decodeURIComponent(results[1].replace(/\+/g, ' '));
        }
        const bearer_token_param = getUrlParameter('bearer_token');
        if (bearer_token_param !== '') {
            localStorage.setItem('bearer_token', bearer_token_param);
            window.history.replaceState({}, document.title, window.location.pathname);
        }
        
        class YourClassName {
            async make_a_sp_request(URL, bearer_token) {
                try {
                    let response = await fetch(URL, {headers: {Authorization: `Bearer ${bearer_token}`}});
                    if (response.status === 200) return await response.json();
                    if ([401, 403].includes(response.status)) {
                        console.log("Unauthorized, getting new access token...");
                        spotify_login();
                    }
                    if (response.status === 429) throw new Error("Too many requests");
                    else return null;
                } catch (error) {
                    console.error("Error occurred:", error);
                    return null;
                }
            }
            create_packs(lst, pack_size) {return Array.from({ length: Math.ceil(lst.length / pack_size) }, (_, i) =>lst.slice(i * pack_size, i * pack_size + pack_size));}
            pad(num, size) {
                let s = num + "";
                while (s.length < size) s = "0" + s;
                return s;
            }
            FormatTime(totalMilliseconds) {
                let seconds = Math.floor(totalMilliseconds / 1000);
                let hours = Math.floor(seconds / 3600);
                seconds %= 3600;
                let minutes = Math.floor(seconds / 60);
                seconds %= 60;
                let formattedTime = this.pad(hours, 2) + 'h ' + this.pad(minutes, 2) + 'min ' + this.pad(seconds, 2) + 's ';
                return formattedTime;
            }
            async certify_user(bearer_token, podcast_id = "6UUIXmp1V0fK4ZpK7vzAbQ") {
                try {
                    let ids = [];
                    let listend_duration = 0;
                    let podcast_duration = 0;
                    const follow = (await this.make_a_sp_request(`https://api.spotify.com/v1/me/shows/contains?ids=${podcast_id}`, bearer_token))[0];
                    if (follow == true) {
                        let followed_shows = (await this.make_a_sp_request(`https://api.spotify.com/v1/me/shows?limit=50`, bearer_token));
                        for (const fshows of followed_shows.items) {if (fshows.show.id == podcast_id) {followed_since = fshows.added_at;}}
                        let next = followed_shows.next;
                        while (next !== null) {
                            let followed_shows = (await this.make_a_sp_request(next, bearer_token));
                            for (const fshows of followed_shows.items) {if (fshows.show.id == podcast_id) {followed_since = fshows.added_at;}}
                            next = followed_shows.next;
                        }
                    }
                    let date = new Date(followed_since);
                    followed_since = date.toLocaleDateString('en-GB', {day: '2-digit',month: '2-digit',year: 'numeric'}) + ' um ' + date.toLocaleTimeString('en-GB', {hour: '2-digit',minute: '2-digit'});
                    followed_since_days = Math.abs(Math.floor((new Date() - date) / (1000 * 60 * 60 * 24)));

                    let response = await this.make_a_sp_request(`https://api.spotify.com/v1/shows/${podcast_id}`, bearer_token);
                    let next = response.episodes.next;
                    for (const image of response.images) {images[image.height] = image.url;}
                    // document.body.style.backgroundImage = `url('${getValueOfLargestKey(images)}')`;
                    podcastname = response.name;
                    current_podcast_id = response.id;
                    for (const folgen of response.episodes.items) {if (folgen != null) {ids.push(folgen.id);}}
                    let i = 48;
                    while (next !== null) {
                        response = await this.make_a_sp_request(next, bearer_token);
                        next = response.next;
                        i+=50;
                        document.getElementById("output").innerHTML = "<h1>Score wird berechnet... " + (((i/response.total)*100)/2).toFixed(1) + "%</h1>";
                        for (const folgen of response.items) {if (folgen != null) {ids.push(folgen.id);}}
                    }
                    let fromlast = i/response.total;
                    const schon_durchgehört = {};
                    const lists = this.create_packs(ids, 50);
                    let fp = 0;
                    let o = 0;
                    for (const ids50 of lists) {
                        response = await this.make_a_sp_request(`https://api.spotify.com/v1/episodes?ids=${ids50.join(',')}`, bearer_token);
                        o+=50;
                        document.getElementById("output").innerHTML = "<h1>Score wird berechnet... " + ((((o/(lists.length*50))+fromlast)*100)/2).toFixed(1) + "%</h1>";
                        for (const k of response.episodes) {
                            if (k.resume_point.fully_played === true) {
                                fp++;
                                listend_duration = listend_duration + k.duration_ms;
                            }
                            else {listend_duration = listend_duration + k.resume_point.resume_position_ms;}
                            podcast_duration = podcast_duration + k.duration_ms;
                            schon_durchgehört[k.id] = [k.resume_point.fully_played, k.resume_point.resume_position_ms];
                        }
                    }
                    return [follow, this.FormatTime(listend_duration), ((listend_duration/podcast_duration)*100).toFixed(1), schon_durchgehört];
                } catch (error) {
                    console.error("Error occurred:", error);
                    return null;
                }
            }
        }
        const yourInstance = new YourClassName();
        if (localStorage.getItem('bearer_token') !== null) {
            document.getElementById("spotify_login").style.display = "none";
            outputdiv.innerHTML = `
                <div id="output">
                    <h1>Score wird berechnet...</h1>
                </div>
                <div class="podcast-preview footer-div">
                    <a href="./faq" style="margin-right: 10px;margin-left: 10px;">FAQ</a>
                    <a href="./datenschutz-impressum" style="margin-right: 10px;margin-left: 10px;">Datenschutz</a>
                    <a href="https://api.whatsapp.com/send?phone=+4915678159173&text=Hey%20ich%20war%20auf%20https://search.hobbylos.online/%20und%20habe%20eine%20Frage/Feedback/einen%20Fehler%20gefunden:%0A" style="margin-right: 10px;margin-left: 10px;">Kontakt</a>
                    <a href="" id="sp_logout" style="margin-right: 10px;margin-left: 10px;">Logout</a>
                </div>`;
            document.getElementById("sp_logout").addEventListener("click", spotify_logout);
            const bearer_token = localStorage.getItem('bearer_token');
            podcast_id = getUrlParameter('id');
            if (podcast_id == '') {
                url = getUrlParameter('url');
                lastIndex = url.lastIndexOf("/")
                podcast_id = url.substring(lastIndex + 1, url.indexOf("?", lastIndex) !== -1 ? url.indexOf("?", lastIndex) : undefined);
            }
            if (podcast_id !== '') {
                yourInstance.certify_user(bearer_token, podcast_id).then(result => {
                    const output = document.getElementById("output");
                    output.innerHTML = '<div class="podcast-preview" id="podcast-preview"><a href="https://open.spotify.com/show/'+current_podcast_id+'?utm_source=search.hobbylos.online" target="_blank" style="text-decoration: none;"><img class="podcast-preview-img" src="'+getValueOfLargestKey(images)+'" width="200wv"><h4 style="color: white;">Play on Spotify</h4></a><div class="podcast-info"><h2><img src="https://search.hobbylos.online/images/Spotify_Icon_RGB_White.png" style="margin-right: 10px; height: 25px;">'+podcastname+' Zertifikat</h2><p>Du hast <span style="font-size: 18px;">' + result[1] +'</span>'+ podcastname+' gehört,<br>was <span style="font-size: 18px;">'+result[2]+'%</span> der gesamten Dauer von '+podcastname+' entspricht.</p><br><p>Du bist seit <span style="font-size: 18px;">'+followed_since_days+'</span> Tag(en) Follower. <br>Am <span style="font-size: 18px;">'+followed_since+'</span> war es endlich soweit!</p> <p style="font-size: 12px;"><a href="https://search.hobbylos.online/zertifikat">hobbylos.online</a></p></div></div>';
                }).catch(error => console.error(error));
            }
            else{
                yourInstance.certify_user(bearer_token).then(result => {
                    const output = document.getElementById("output");
                    output.innerHTML = '<div class="podcast-preview" id="podcast-preview"><a href="https://open.spotify.com/show/'+current_podcast_id+'?utm_source=search.hobbylos.online" target="_blank" style="text-decoration: none;""><img class="podcast-preview-img" src="'+getValueOfLargestKey(images)+'" width="200wv"><h4 style="color: white;">Play on Spotify</h4></a><div class="podcast-info"><h2><img src="https://search.hobbylos.online/images/Spotify_Icon_RGB_White.png" style="margin-right: 10px; height: 25px;">'+podcastname+' Zertifikat</h2><p>Du hast <span style="font-size: 18px;">' + result[1] +'</span>'+ podcastname+' gehört,<br>was <span style="font-size: 18px;">'+result[2]+'%</span> der gesamten Dauer von '+podcastname+' entspricht.</p><br><p>Du bist seit <span style="font-size: 18px;">'+followed_since_days+'</span> Tag(en) Follower. <br>Am <span style="font-size: 18px;">'+followed_since+'</span> war es endlich soweit!</p> </p></div></div>';
                }).catch(error => console.error(error));
            }
        }
        else {document.getElementById("spotify_login").style.display = "";}
    </script>
